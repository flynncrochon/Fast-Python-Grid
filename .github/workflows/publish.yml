name: publish

# Build the Windows wheel + sdist and publish to PyPI when a GitHub Release is
# published. Uses PyPI Trusted Publishing (OIDC) -- no API token needed.
on:
  release:
    types: [published]
  workflow_dispatch:      # adds a manual "Run workflow" button in the Actions tab

jobs:
  publish:
    runs-on: windows-latest        # needs MSVC + CMake to compile the DLLs (preinstalled)
    permissions:
      id-token: write              # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
