name: Run tests

# Headless core tests (no GL/display). The native libs are gitignored, so each
# runner compiles just gridcore, the C++ data engine the CoreModel tests need.
# glsurface (the GL renderer) isn't touched by any test, so it's skipped.
#   Linux:   one g++ line (gridcore.cpp is standalone, no GL/X11/FreeType).
#   Windows: CMake, which finds MSVC itself and skips the GL find_package (WIN32).
on:
  push:
    branches: [main, opengl]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build gridcore.so (Linux)
        if: runner.os == 'Linux'
        run: g++ -O2 -std=c++17 -fPIC -shared fastpygrid/csrc/gridcore.cpp -o fastpygrid/core/gridcore.so
      - name: Build gridcore.dll (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build
          cmake --build build --config Release --target gridcore
          Copy-Item build/Release/gridcore.dll fastpygrid/core/
      - run: python -m pip install pytest
      - run: python -m pytest -q
