name: Run tests

# Headless core tests (no GL/display, no build): the native libs are checked
# into the repo, so pytest just imports them. Runs on both OSes to prove the
# committed Windows DLLs and Linux .so both load.
on:
  push:
    branches: [main, opengl]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install pytest
      - run: python -m pytest -q
